name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend_test:
    name: 1. Backend Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    services:
      postgres:
        image: postgres:18
        env:
            PROJECT_NAME: test_project
            POSTGRES_SERVER: 127.0.0.1
            POSTGRES_PORT: 5432
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: changethis
            POSTGRES_DB: app
            FIRST_SUPERUSER: admin@example.com
            FIRST_SUPERUSER_PASSWORD: changethis
            SECRET_KEY: changethis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --group dev

      - name: Run migrations and seed data
        working-directory: backend
        run: |
          uv run python app/backend_pre_start.py
          uv run alembic upgrade head
          uv run python app/initial_data.py

      - name: Run backend tests
        working-directory: backend
        run: uv run pytest tests --junitxml test-results.xml

      - name: Publish test report
        if: ${{ always() }}
        uses: dorny/test-reporter@v2
        with:
          name: backend-pytest
          path: backend/test-results.xml
          reporter: java-junit
          fail-on-error: false

  frontend_build:
    name: 2. Frontend Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            backend/pyproject.toml

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --group dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Generate frontend client
        working-directory: backend
        run: uv run python -c "import app.main, json; print(json.dumps(app.main.app.openapi()))" > ../frontend/openapi.json

      - name: Build frontend
        env:
          VITE_API_URL: ${{ vars.FRONTEND_VITE_API_URL || 'http://localhost:8000' }}
        run: |
          bun run --filter frontend generate-client
          bun run --filter frontend build

  sonar:
    name: 3. Sonar (master)
    runs-on: ubuntu-24.04
    needs:
      - backend_test
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'master' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check sonar-project.properties
        id: sonar_props
        run: |
          if [ -f sonar-project.properties ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarQube Scan
        if: ${{ steps.sonar_props.outputs.exists == 'true' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_publish:
    name: 4. Build and Publish
    runs-on: ubuntu-24.04
    needs:
      - backend_test
      - frontend_build
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'develop' || github.ref_name == 'master') }}
    permissions:
      contents: read
    env:
      REGISTRY_HOST: nexus.dada-tuda.ru
      REGISTRY_NAMESPACE: dada
      BACKEND_IMAGE_REPO: task-decomposition-backend
      FRONTEND_IMAGE_REPO: task-decomposition-frontend
    outputs:
      image_tag: ${{ steps.image_tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute image tag
        id: image_tag
        run: echo "value=${GITHUB_REF_NAME}-1.0.0-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Compute image names
        id: image_names
        run: |
          echo "backend=${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${BACKEND_IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${FRONTEND_IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image_names.outputs.backend }}
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.value }}

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image_names.outputs.frontend }}
          tags: |
            type=raw,value=${{ steps.image_tag.outputs.value }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Nexus Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.FRONTEND_VITE_API_URL || 'http://localhost:8000' }}

  update_argo_repo:
    name: 5. Update Argo Repo
    runs-on: ubuntu-24.04
    needs:
      - build_publish
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'develop' || github.ref_name == 'master') }}
    permissions:
      contents: read
    env:
      BACKEND_VALUES_DIR: helm/python/services/task-decomposition-backend
      FRONTEND_VALUES_DIR: helm/javascript/services/task-decomposition-frontend
    steps:
      - name: Update image tag in Argo repo
        env:
          ARGO_REPO_URL: ${{ secrets.ARGO_REPO_URL }}
          ARGO_REPO_USERNAME: ${{ secrets.ARGO_REPO_USERNAME }}
          ARGO_REPO_PASSWORD: ${{ secrets.ARGO_REPO_PASSWORD }}
          IMAGE_TAG: ${{ needs.build_publish.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ "${ARGO_REPO_URL}" != https://* ]]; then
            echo "ARGO_REPO_URL must be HTTPS when using git credentials"
            exit 1
          fi

          if [ -z "${ARGO_REPO_USERNAME}" ] || [ -z "${ARGO_REPO_PASSWORD}" ]; then
            echo "ARGO_REPO_USERNAME/ARGO_REPO_PASSWORD are required"
            exit 1
          fi

          CLEAN_REPO_URL="https://${ARGO_REPO_URL#https://}"
          cat > /tmp/git-askpass.sh <<'ASKPASS'
          #!/usr/bin/env bash
          case "$1" in
            *Username*) echo "$ARGO_REPO_USERNAME" ;;
            *Password*) echo "$ARGO_REPO_PASSWORD" ;;
            *) echo "" ;;
          esac
          ASKPASS
          chmod 700 /tmp/git-askpass.sh
          export GIT_ASKPASS=/tmp/git-askpass.sh
          export GIT_TERMINAL_PROMPT=0

          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            BACKEND_VALUES_PATH="${BACKEND_VALUES_DIR}/values.yaml"
            FRONTEND_VALUES_PATH="${FRONTEND_VALUES_DIR}/values.yaml"
          else
            BACKEND_VALUES_PATH="${BACKEND_VALUES_DIR}/values-dev.yaml"
            FRONTEND_VALUES_PATH="${FRONTEND_VALUES_DIR}/values-dev.yaml"
          fi

          update_image_tag() {
            local values_path="$1"

            if [ ! -f "${values_path}" ]; then
              echo "Values file not found: ${values_path}"
              exit 1
            fi

            if grep -qE '^[[:space:]]*tag:' "${values_path}"; then
              sed -Ei "s#^([[:space:]]*tag:[[:space:]]*).*\$#\\1\"${IMAGE_TAG}\"#g" "${values_path}"
            else
              printf '\nimage:\n  tag: "%s"\n' "${IMAGE_TAG}" >> "${values_path}"
            fi
          }

          rm -rf /tmp/argo-repo
          git clone "${CLEAN_REPO_URL}" /tmp/argo-repo
          cd /tmp/argo-repo

          update_image_tag "${BACKEND_VALUES_PATH}"
          update_image_tag "${FRONTEND_VALUES_PATH}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "${BACKEND_VALUES_PATH}" "${FRONTEND_VALUES_PATH}"

          if ! git diff --staged --quiet; then
            git commit -m "chore(argo): bump image.tag to ${IMAGE_TAG}"
            git push origin HEAD
          fi
