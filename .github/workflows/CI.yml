name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 1. Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        env:
          PIP_NEXUS_CONFIG: ${{ secrets.PIP_NEXUS_CONFIG }}
        run: |
          python -m pip install -U pip
          if [ -n "${PIP_NEXUS_CONFIG:-}" ]; then
            printf '%s\n' "$PIP_NEXUS_CONFIG" > "$RUNNER_TEMP/pip.conf"
            export PIP_CONFIG_FILE="$RUNNER_TEMP/pip.conf"
          fi
          python -m pip install -r requirements.txt
          python -m pip install -r ./requirements/requirements.test.txt

      - name: Test with pytest
        run: python -m pytest --junitxml test-results.xml

      - name: Publish test report
        if: ${{ always() }}
        uses: dorny/test-reporter@v2
        with:
          name: pytest
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

  sonar:
    name: 1.1. Sonar (develop)
    runs-on: ubuntu-24.04
    needs: test
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'develop' && hashFiles('sonar-project.properties') != '' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_publish:
    name: 2. Build and Publish
    runs-on: ubuntu-24.04
    needs: test
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'develop' || github.ref_name == 'master') }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/task_decomposition
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v7.0.0-28

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task_decomposition:cache-latest
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/task_decomposition:cache-latest,mode=max
          secrets: |
            HASH_PASSWORD=${{ secrets.DOCKER_UID_HASH_PASSWORD }}
